name: 🤖 Claude 자동 가비지 컬렉션

on:
  schedule:
    - cron: '0 0 * * *' # 매일 자정 (KST 09:00)
  workflow_dispatch:     # 수동 실행도 가능

jobs:
  claude-cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Claude Code 설치
        run: npm install -g @anthropic-ai/claude-code

      - name: 브랜치 생성
        run: |
          BRANCH="chore/auto-cleanup-$(date +%Y%m%d)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b $BRANCH

      - name: Claude 품질 스캔 & 수정
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --dangerously-skip-permissions -p "
            다음 문서들을 순서대로 읽고 기준으로 삼아줘:
            1. docs/QUALITY_SCORE.md
            2. docs/REACT_BEST_PRACTICE.md
            3. docs/design-docs/ui-improvement-criteria.md
            4. AGENTS.md

            코드베이스 전체를 스캔하고 아래 순서로 수정해줘:

            [품질 수정]
            - any 타입 사용 → 올바른 타입으로 교체
            - useEffect 의존성 배열 누락 → 추가
            - key prop에 인덱스 사용 → id로 교체
            - AGENTS.md 스키마와 맞지 않는 타입 → 수정

            [React 패턴 수정]
            - 에이전트 로직이 컴포넌트 안에 있음 → agents/로 분리
            - barrel export 누락 → index.ts 추가
            - 재사용 가능한 로직이 커스텀 훅으로 분리 안 됨 → 분리

            [UI 개선] (ui-improvement-criteria.md 개선 가능 범위만)
            - aria-label, alt 누락 → 추가
            - 하드코딩 색상 → CSS Variables로 교체
            - 빈 상태(EmptyState) 누락 → 추가
            - 로딩 스켈레톤 누락 → 추가

            수정이 없으면 'NO_CHANGES' 라고만 출력.
            수정했으면 카테고리별로 수정 내역을 정리해줘.
          " > /tmp/claude-output.txt
          cat /tmp/claude-output.txt
          grep -q "NO_CHANGES" /tmp/claude-output.txt && echo "SKIP=true" >> $GITHUB_ENV || echo "SKIP=false" >> $GITHUB_ENV

      - name: 변경사항 커밋 & PR 생성
        if: env.SKIP == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@noreply"
          git add .
          git commit -m "chore: 자동 품질 정리 $(date +%Y-%m-%d)"
          git push origin $BRANCH

          gh pr create \
            --title "chore: 자동 품질 정리 $(date +%Y-%m-%d)" \
            --body "$(cat /tmp/claude-output.txt)" \
            --label "auto-cleanup" \
            --base main
