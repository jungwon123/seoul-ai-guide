name: 🔍 Claude PR 자동 리뷰

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code 설치
        run: npm install -g @anthropic-ai/claude-code

      - name: 변경된 파일 수집
        run: |
          git diff origin/main...HEAD --name-only > /tmp/changed-files.txt
          cat /tmp/changed-files.txt

      - name: Claude 코드 리뷰
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CHANGED=$(cat /tmp/changed-files.txt)
          claude -p "
            다음 문서를 먼저 읽어줘:
            - AGENTS.md
            - docs/FRONTEND.md
            - docs/QUALITY_SCORE.md
            - docs/REACT_BEST_PRACTICE.md
            - docs/design-docs/ui-improvement-criteria.md

            이 PR의 변경 파일들을 리뷰해줘: $CHANGED

            리뷰 기준:
            1. AGENTS.md 출력 스키마 준수 여부
            2. any 타입 사용 여부
            3. 빈 상태 / 로딩 / 에러 3종 처리 여부
            4. FRONTEND.md 컴포넌트 단일 책임 준수
            5. useEffect 의존성 배열 완전 명시 여부
            6. 에이전트 로직이 agents/에 분리되어 있는가
            7. aria-label, alt 누락 여부
            8. 하드코딩 색상 사용 여부 (CSS Variables 써야 함)
            9. barrel export 사용 여부

            형식:
            ## ✅ 통과
            ## ⚠️ 개선 권장 (머지 가능)
            ## ❌ 필수 수정 (머지 블락)
          " > /tmp/review-output.txt
          cat /tmp/review-output.txt

      - name: PR에 리뷰 코멘트 작성
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## 🤖 Claude 자동 리뷰

          $(cat /tmp/review-output.txt)

          ---
          *AGENTS.md · FRONTEND.md · QUALITY_SCORE.md · REACT_BEST_PRACTICE.md · ui-improvement-criteria.md 기준으로 자동 생성*"
