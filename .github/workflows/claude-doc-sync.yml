name: 📚 Claude 문서 자가 갱신

on:
  push:
    branches: [main]
    paths:
      # 코드가 바뀌면 관련 문서를 자동 갱신
      - 'src/agents/**'
      - 'src/components/**'
      - 'src/stores/**'
      - 'src/types/**'
      - 'src/mocks/**'

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 이전 커밋과 비교하기 위해

      - name: Claude Code 설치
        run: npm install -g @anthropic-ai/claude-code

      - name: 변경된 파일 감지
        run: |
          git diff HEAD~1 HEAD --name-only > /tmp/changed.txt
          cat /tmp/changed.txt
          echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
          cat /tmp/changed.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Claude 문서 동기화
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --dangerously-skip-permissions -p "
            다음 파일들이 방금 main에 머지됐어:
            $CHANGED_FILES

            각 변경 파일을 실제로 읽고, 아래 문서들 중
            **내용이 실제와 달라진 부분만** 찾아서 업데이트해줘.

            갱신 대상 문서:
            - AGENTS.md              → 에이전트 스키마/역할이 바뀌었으면
            - ARCHITECTURE.md        → 폴더 구조나 레이어가 바뀌었으면
            - docs/FRONTEND.md       → 컴포넌트 구조/상태관리가 바뀌었으면
            - docs/QUALITY_SCORE.md  → 새 품질 기준이 생겼으면
            - docs/exec-plans/tech-debt-tracker.md → 해결된 부채 또는 새 부채

            규칙:
            - 실제 코드와 다른 내용만 수정 (과도한 변경 금지)
            - 추측으로 쓰지 말고, 파일을 직접 읽고 사실만 반영
            - 변경한 문서와 변경 이유를 목록으로 출력해줘
            - 변경 없으면 'NO_CHANGES' 출력

            문서 갱신 후 반드시 아래 원칙도 점검:
            - AGENTS.md 스키마와 실제 타입 파일(src/types/)이 일치하는가
            - FRONTEND.md 컴포넌트 트리와 실제 src/components/ 구조가 일치하는가
          " > /tmp/doc-sync-output.txt
          cat /tmp/doc-sync-output.txt
          grep -q "NO_CHANGES" /tmp/doc-sync-output.txt && echo "SKIP=true" >> $GITHUB_ENV || echo "SKIP=false" >> $GITHUB_ENV

      - name: 문서 변경사항 커밋 & PR 생성
        if: env.SKIP == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="docs/auto-sync-$(date +%Y%m%d%H%M)"
          git checkout -b $BRANCH
          git config user.name "claude-bot"
          git config user.email "claude-bot@noreply"
          git add 'AGENTS.md' 'ARCHITECTURE.md' 'docs/'
          git commit -m "docs: 코드 변경에 따른 문서 자동 동기화 $(date +%Y-%m-%d)"
          git push origin $BRANCH

          gh pr create \
            --title "docs: 자동 문서 동기화 $(date +%Y-%m-%d)" \
            --body "## 📚 변경된 문서
            $(cat /tmp/doc-sync-output.txt)

            ## 트리거된 코드 변경
            \`\`\`
            $CHANGED_FILES
            \`\`\`

            ---
            *코드 변경을 감지하여 Claude가 자동으로 관련 문서를 갱신했습니다.*
            *머지 전 내용이 실제와 일치하는지 확인해주세요.*" \
            --label "docs,auto-generated" \
            --base main
