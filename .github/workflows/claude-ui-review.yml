name: 🎨 Claude UI 시각 리뷰

on:
  # Vercel이 배포 완료하면 자동 트리거
  deployment_status:

  # 수동 트리거
  workflow_dispatch:
    inputs:
      deploy_url:
        description: '배포된 앱 URL'
        required: false
        default: 'https://seoul-ai-guide.vercel.app'

jobs:
  ui-visual-review:
    runs-on: ubuntu-latest
    # 배포 성공 시에만 실행 (또는 수동)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.deployment_status.state == 'success'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preview URL 결정
        id: url
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "url=${{ github.event.inputs.deploy_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ github.event.deployment_status.target_url }}" >> $GITHUB_OUTPUT
          fi
          echo "Preview URL: $(cat $GITHUB_OUTPUT | grep url | cut -d= -f2)"

      - name: Playwright 설치 및 스크린샷 촬영
        run: |
          npx playwright install chromium

          node << 'SCRIPT'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const url = '${{ steps.url.outputs.url }}';
            console.log('스크린샷 촬영:', url);

            // 데스크탑
            const desktop = await browser.newPage();
            await desktop.setViewportSize({ width: 1440, height: 900 });
            await desktop.goto(url, { waitUntil: 'networkidle', timeout: 30000 });
            await desktop.waitForTimeout(2000);
            await desktop.screenshot({ path: '/tmp/ui-desktop.png', fullPage: false });

            // 모바일
            const mobile = await browser.newPage();
            await mobile.setViewportSize({ width: 375, height: 812 });
            await mobile.goto(url, { waitUntil: 'networkidle', timeout: 30000 });
            await mobile.waitForTimeout(2000);
            await mobile.screenshot({ path: '/tmp/ui-mobile.png', fullPage: false });

            await browser.close();
            console.log('스크린샷 촬영 완료');
          })();
          SCRIPT

      - name: Claude Vision으로 UI 분석
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');

          const desktopImg = fs.readFileSync('/tmp/ui-desktop.png').toString('base64');
          const mobileImg = fs.readFileSync('/tmp/ui-mobile.png').toString('base64');
          const designDoc = fs.readFileSync('docs/DESIGN.md', 'utf8');

          (async () => {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 3000,
                messages: [{
                  role: 'user',
                  content: [
                    { type: 'image', source: { type: 'base64', media_type: 'image/png', data: desktopImg } },
                    { type: 'image', source: { type: 'base64', media_type: 'image/png', data: mobileImg } },
                    { type: 'text', text: `UI 리뷰를 해줘. 첫 번째 이미지는 데스크탑, 두 번째는 모바일(375px).

DESIGN.md 기준:
${designDoc.substring(0, 3000)}

분석 항목:
1. DESIGN.md 준수도 (0-100)
2. 데스크탑/모바일 각각 문제점 (최대 5개씩)
3. 접근성 이슈
4. 개선 제안

마크다운으로 응답해줘.` }
                  ]
                }]
              })
            });

            const data = await response.json();
            const review = data.content[0].text;
            fs.writeFileSync('/tmp/ui-review.md', review);
            console.log(review);
          })();
          SCRIPT

      - name: PR에 리뷰 코멘트 작성
        if: github.event.deployment_status.environment == 'Preview' && env.ANTHROPIC_API_KEY != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Vercel Preview는 PR과 연결됨 — 해당 PR 찾기
          BRANCH="${{ github.event.deployment.ref }}"
          PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$PR_NUMBER" ] && [ -f "/tmp/ui-review.md" ]; then
            REVIEW=$(cat /tmp/ui-review.md)
            gh pr comment "$PR_NUMBER" --body "## 🎨 Claude UI 시각 리뷰

**Preview URL**: ${{ steps.url.outputs.url }}

${REVIEW}

---
*Vercel Preview 배포 후 자동 생성된 리뷰입니다.*"
          fi
