name: 🩺 주간 문서 건강 검진

on:
  schedule:
    - cron: '0 1 * * 1'  # 매주 월요일 오전 10시 (KST)
  workflow_dispatch:

jobs:
  doc-health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Claude Code 설치
        run: npm install -g @anthropic-ai/claude-code

      - name: Claude 문서 전체 건강 검진
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --dangerously-skip-permissions -p "
            프로젝트의 모든 문서와 실제 코드를 비교해서
            '문서 건강 검진 리포트'를 작성해줘.

            검진 항목:
            1. 부패 탐지 (Staleness)
               - AGENTS.md 스키마 vs 실제 src/types/ 타입 일치 여부
               - FRONTEND.md 컴포넌트 목록 vs 실제 src/components/ 구조
               - PLANS.md 마일스톤 vs 실제 구현 완료 상태
               - tech-debt-tracker.md 해결된 항목 중 아직 open인 것

            2. 누락 탐지 (Missing Coverage)
               - 코드에 존재하지만 문서에 없는 컴포넌트/에이전트
               - docs/product-specs/에 스펙 없는 화면이 있는지

            3. 충돌 탐지 (Conflicts)
               - 서로 다른 문서 간 상충되는 내용
               - 예: AGENTS.md 스키마와 FRONTEND.md 타입 정의가 다른 경우

            4. 개선 제안 (Suggestions)
               - 실제 구현 패턴을 보고 문서에 추가할 만한 내용
               - 더 이상 쓰이지 않는 규칙 제거 대상

            출력 형식:
            ## 🔴 즉시 수정 필요
            ## 🟡 이번 주 안에 수정 권장
            ## 🟢 양호
            ## 💡 개선 제안

            심각한 문제(🔴)가 있으면 직접 수정하고 PR을 열어줘.
            경미한 문제(🟡)는 GitHub Issue로 등록해줘.
          " > /tmp/health-report.txt
          cat /tmp/health-report.txt

          # 심각도 판단
          grep -q "🔴" /tmp/health-report.txt && echo "HAS_CRITICAL=true" >> $GITHUB_ENV || echo "HAS_CRITICAL=false" >> $GITHUB_ENV
          grep -q "🟡" /tmp/health-report.txt && echo "HAS_WARNING=true" >> $GITHUB_ENV || echo "HAS_WARNING=false" >> $GITHUB_ENV

      - name: 심각한 문제 → PR 생성
        if: env.HAS_CRITICAL == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="docs/health-fix-$(date +%Y%m%d)"
          git checkout -b $BRANCH
          git config user.name "claude-bot"
          git config user.email "claude-bot@noreply"
          git add 'AGENTS.md' 'ARCHITECTURE.md' 'docs/'
          git diff --staged --quiet || git commit -m "docs: 주간 건강검진 긴급 수정 $(date +%Y-%m-%d)"
          git push origin $BRANCH || true

          gh pr create \
            --title "🔴 docs: 주간 건강검진 긴급 수정 $(date +%Y-%m-%d)" \
            --body "$(cat /tmp/health-report.txt)" \
            --label "docs,urgent,auto-generated" \
            --base main

      - name: 경고 항목 → Issue 등록
        if: env.HAS_WARNING == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "🟡 주간 문서 건강검진 리포트 $(date +%Y-%m-%d)" \
            --body "$(cat /tmp/health-report.txt)" \
            --label "docs,tech-debt"
